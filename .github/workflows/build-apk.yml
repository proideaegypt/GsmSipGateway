name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Init React Native project
        run: npx react-native@0.73.6 init AppProject --version 0.73.6 --skip-install

      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE/AppProject
          npm install --legacy-peer-deps
          npm install @react-native-async-storage/async-storage --legacy-peer-deps

      - name: Copy source files (keep template settings.gradle)
        run: |
          APP=$GITHUB_WORKSPACE/AppProject
          SRC=$GITHUB_WORKSPACE/source

          mkdir -p $APP/src
          cp $SRC/src/App.js $APP/src/App.js
          cp $SRC/index.js $APP/index.js
          cp $SRC/app.json $APP/app.json

          PKG=$APP/android/app/src/main/java/com/gsmsipgateway
          mkdir -p $PKG
          cp $SRC/android/app/src/main/java/com/gsmsipgateway/*.java $PKG/

          cp $SRC/android/app/src/main/AndroidManifest.xml \
             $APP/android/app/src/main/AndroidManifest.xml

          mkdir -p $APP/android/app/src/main/res/values
          cp $SRC/android/app/src/main/res/values/strings.xml \
             $APP/android/app/src/main/res/values/strings.xml
          cp $SRC/android/app/src/main/res/values/styles.xml \
             $APP/android/app/src/main/res/values/styles.xml

          cp $SRC/android/app/proguard-rules.pro $APP/android/app/proguard-rules.pro

          # Only patch gradle.properties - NOT settings.gradle or build.gradle root
          printf '%s\n' \
            'android.useAndroidX=true' \
            'android.enableJetifier=true' \
            'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m' \
            'newArchEnabled=false' \
            'hermesEnabled=true' \
            > $APP/android/gradle.properties

          # Patch ONLY app/build.gradle - add Linphone + our config
          printf '%s\n' \
            'apply plugin: "com.android.application"' \
            'apply plugin: "org.jetbrains.kotlin.android"' \
            'apply plugin: "com.facebook.react"' \
            '' \
            'react { autolinkLibrariesWithApp() }' \
            '' \
            'android {' \
            '    ndkVersion rootProject.ext.ndkVersion' \
            '    buildToolsVersion rootProject.ext.buildToolsVersion' \
            '    compileSdk rootProject.ext.compileSdkVersion' \
            '    namespace "com.gsmsipgateway"' \
            '    defaultConfig {' \
            '        applicationId "com.gsmsipgateway"' \
            '        minSdkVersion rootProject.ext.minSdkVersion' \
            '        targetSdkVersion rootProject.ext.targetSdkVersion' \
            '        versionCode 1' \
            '        versionName "1.0"' \
            '    }' \
            '    signingConfigs {' \
            '        release {' \
            '            storeFile file("keystore/release.keystore")' \
            '            storePassword "android123"' \
            '            keyAlias "release"' \
            '            keyPassword "android123"' \
            '        }' \
            '    }' \
            '    buildTypes {' \
            '        debug { signingConfig signingConfigs.debug }' \
            '        release {' \
            '            signingConfig signingConfigs.release' \
            '            minifyEnabled false' \
            '            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"' \
            '        }' \
            '    }' \
            '}' \
            '' \
            'dependencies {' \
            '    implementation("com.facebook.react:react-android")' \
            '    implementation("com.facebook.react:hermes-android")' \
            '    implementation "org.linphone:linphone-sdk-android:5.3.+"' \
            '    implementation "androidx.core:core:1.12.0"' \
            '    implementation "androidx.localbroadcastmanager:localbroadcastmanager:1.1.0"' \
            '}' \
            > $APP/android/app/build.gradle

          # Force Gradle 8.6
          printf '%s\n' \
            'distributionBase=GRADLE_USER_HOME' \
            'distributionPath=wrapper/dists' \
            'distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip' \
            'networkTimeout=10000' \
            'zipStoreBase=GRADLE_USER_HOME' \
            'zipStorePath=wrapper/dists' \
            > $APP/android/gradle/wrapper/gradle-wrapper.properties

          echo "=== settings.gradle (template - untouched) ==="
          cat $APP/android/settings.gradle
          echo "=== app/build.gradle ==="
          cat $APP/android/app/build.gradle

      - name: Generate Keystore
        run: |
          mkdir -p $GITHUB_WORKSPACE/AppProject/android/app/keystore
          keytool -genkeypair -v \
            -keystore $GITHUB_WORKSPACE/AppProject/android/app/keystore/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=GsmSipGateway,OU=Dev,O=Dev,L=Cairo,ST=Cairo,C=EG"

      - name: Build Release APK
        run: |
          cd $GITHUB_WORKSPACE/AppProject/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GsmSipGateway-release
          path: AppProject/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
